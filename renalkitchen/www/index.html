<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>RenalKitchen</title>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div class="overlay" id="overlay"></div>
<div class="profile-panel" id="profilePanel">
  <div class="profile-header">
    <div style="display:flex;align-items:center;gap:.7rem">
      <div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#c4684a,#e8937a);display:flex;align-items:center;justify-content:center;font-size:1rem">👤</div>
      <div>
        <div style="font-family:Georgia,serif;font-size:1rem;color:#5c3d2e">Profile</div>
        <div style="font-size:.71rem;color:#8a7060">Gespeichert in Home Assistant</div>
      </div>
    </div>
    <button id="closeProfile" style="border:none;background:none;font-size:1.4rem;cursor:pointer;color:#8a7060;line-height:1;padding:.2rem">&#10005;</button>
  </div>
  <div class="profile-body" id="profileBody"></div>
  <div class="profile-footer" id="profileFooter">
    <button class="btn-main" id="saveProfileBtn">Profil speichern</button>
  </div>
</div>

<div id="app"><div style="min-height:100vh;display:flex;align-items:center;justify-content:center;color:#8a7060">Loading&#8230;</div></div>


<script src="app.js"></script>
</body>
</html>
